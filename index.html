<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JISOO AI 経営ダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="config.js"></script>
<style>
/* ===== リセット・基本 ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f2;color:#1a1a1a;font-size:15px;line-height:1.6}
button{cursor:pointer;font-family:inherit;font-size:inherit}

/* ===== アクセントカラー ===== */
:root{
  --green:#0F6E56;
  --green-light:#e8f5f1;
  --green-mid:#1a8a6c;
  --border:#e0e0d8;
  --card-bg:#ffffff;
  --text-muted:#6b6b6b;
  --radius:12px;
  --shadow:0 1px 4px rgba(0,0,0,.07);
}

/* ===== レイアウト ===== */
.view{display:none}
.view.active{display:block}

/* ===== ログインビュー ===== */
#loginView{
  min-height:100vh;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#f0f7f4 0%,#e8efe8 100%);
}
#loginView.active{display:flex}
.login-card{
  background:var(--card-bg);border-radius:var(--radius);box-shadow:0 4px 24px rgba(0,0,0,.10);
  padding:40px 36px;width:100%;max-width:380px;
}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-size:20px;font-weight:700;color:var(--green);letter-spacing:.04em}
.login-logo p{font-size:12px;color:var(--text-muted);margin-top:4px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:6px}
.form-group input{
  width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;
  font-size:15px;outline:none;transition:border-color .2s;
}
.form-group input:focus{border-color:var(--green)}
.btn-primary{
  width:100%;padding:11px;background:var(--green);color:#fff;border:none;
  border-radius:8px;font-size:15px;font-weight:600;letter-spacing:.02em;
  transition:background .2s;margin-top:8px;
}
.btn-primary:hover{background:var(--green-mid)}
.login-err{color:#c0392b;font-size:13px;margin-top:8px;min-height:18px;text-align:center}

/* ===== ダッシュボードヘッダー ===== */
#dashView{padding-bottom:40px}
.hdr{
  background:var(--card-bg);border-bottom:1px solid var(--border);
  padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100;
}
.hdr h1{font-size:16px;font-weight:700;color:var(--green);flex:1;min-width:180px}
.hdr-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.month-sel{
  padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;
  font-size:14px;background:#fff;color:#1a1a1a;outline:none;
}
.btn-sm{
  padding:6px 14px;border:1.5px solid var(--green);border-radius:8px;
  font-size:13px;font-weight:600;color:var(--green);background:transparent;
  transition:all .2s;white-space:nowrap;
}
.btn-sm:hover{background:var(--green);color:#fff}
.btn-sm.outline-red{border-color:#c0392b;color:#c0392b}
.btn-sm.outline-red:hover{background:#c0392b;color:#fff}
.btn-sm.filled{background:var(--green);color:#fff}
.btn-sm.filled:hover{background:var(--green-mid)}

/* ===== コンテンツエリア ===== */
.main{max-width:1100px;margin:0 auto;padding:20px 16px}

/* ===== サマリーカード ===== */
.summary-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:24px;
}
.summary-card{
  background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:20px 22px;
}
.summary-card .label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}
.summary-card .value{font-size:28px;font-weight:700;color:var(--green);margin:6px 0 4px}
.summary-card .sub{font-size:12px;color:var(--text-muted)}
.summary-card .progress-bar{
  height:4px;background:#eee;border-radius:2px;margin-top:10px;overflow:hidden;
}
.summary-card .progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .5s}

/* ===== セクションタイトル ===== */
.section-title{font-size:14px;font-weight:700;color:var(--text-muted);margin:28px 0 12px;text-transform:uppercase;letter-spacing:.06em}

/* ===== AIカード ===== */
.ai-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:24px}
.ai-card{
  background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:20px 22px;border-top:3px solid var(--green);
}
.ai-card .ai-label{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.ai-card .ai-body{font-size:14px;color:#2a2a2a;line-height:1.7;white-space:pre-wrap;word-break:break-all}
.ai-card .ai-note{font-size:12px;color:var(--text-muted);margin-top:8px;font-style:italic}
.ai-card .badge{
  display:inline-block;padding:3px 10px;border-radius:20px;
  background:var(--green-light);color:var(--green);font-weight:700;font-size:14px;margin-bottom:6px;
}
.ai-card .regen-btn{
  margin-top:10px;padding:5px 12px;border:1.5px solid var(--green);border-radius:6px;
  font-size:12px;font-weight:600;color:var(--green);background:transparent;cursor:pointer;
}
.ai-card .regen-btn:hover{background:var(--green);color:#fff}
.ai-card .preparing{color:var(--text-muted);font-size:13px}

/* ===== グラフ ===== */
.chart-card{
  background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:20px 22px;margin-bottom:24px;
}
.chart-card canvas{max-height:260px}

/* ===== 月次一覧表 ===== */
.table-wrap{overflow-x:auto;margin-bottom:24px}
.metrics-table{
  width:100%;border-collapse:collapse;background:var(--card-bg);
  border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;font-size:13px;
}
.metrics-table th{
  background:var(--green);color:#fff;padding:10px 14px;text-align:right;
  font-weight:600;white-space:nowrap;
}
.metrics-table th:first-child{text-align:left}
.metrics-table td{padding:9px 14px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
.metrics-table td:first-child{text-align:left;font-weight:600;color:#444}
.metrics-table tr:last-child td{border-bottom:none}
.metrics-table tr:hover td{background:#f9f9f7}
.calc-col{color:var(--green);font-weight:600}

/* ===== 入力フォームビュー ===== */
#formView{min-height:100vh;padding-bottom:40px}
.form-hdr{
  background:var(--card-bg);border-bottom:1px solid var(--border);
  padding:12px 20px;display:flex;align-items:center;gap:12px;
}
.form-hdr h2{font-size:16px;font-weight:700;color:var(--green);flex:1}
.form-main{max-width:560px;margin:24px auto;padding:0 16px}
.form-card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px}
.form-row{margin-bottom:18px}
.form-row label{display:block;font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:6px}
.form-row input,.form-row textarea,.form-row select{
  width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;
  font-size:15px;font-family:inherit;outline:none;transition:border-color .2s;
}
.form-row input:focus,.form-row textarea:focus,.form-row select:focus{border-color:var(--green)}
.form-row textarea{resize:vertical;min-height:80px}
.form-row .hint{font-size:11px;color:var(--text-muted);margin-top:4px}
.form-section-title{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin:24px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.save-msg{text-align:center;margin-top:14px;font-size:14px;color:var(--green);min-height:20px}
.save-err{color:#c0392b}

/* ===== 面談レポートビュー ===== */
#reportView{min-height:100vh;padding-bottom:40px}
.report-hdr{
  background:var(--card-bg);border-bottom:1px solid var(--border);
  padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.report-hdr h2{font-size:16px;font-weight:700;color:var(--green);flex:1}
.report-main{max-width:780px;margin:24px auto;padding:0 16px}
.report-card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:36px}
.report-content h1{font-size:22px;font-weight:700;margin-bottom:16px;color:#111}
.report-content h2{font-size:17px;font-weight:700;margin:20px 0 8px;color:#111;border-bottom:1px solid var(--border);padding-bottom:4px}
.report-content h3{font-size:15px;font-weight:700;margin:16px 0 6px;color:#333}
.report-content p{margin-bottom:10px;line-height:1.8}
.report-content ul,.report-content ol{margin:8px 0 12px 20px}
.report-content li{margin-bottom:4px;line-height:1.7}
.report-content table{border-collapse:collapse;width:100%;margin:12px 0;font-size:13px}
.report-content table th,.report-content table td{border:1px solid #ccc;padding:6px 10px;text-align:left}
.report-content table th{background:#f0f0ee;font-weight:600}
.report-content strong{font-weight:700}
.report-generated{font-size:11px;color:var(--text-muted);margin-top:20px;text-align:right}
.report-generating{text-align:center;padding:40px;color:var(--text-muted);font-size:14px}

/* ===== スピナー ===== */
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #ccc;border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== 印刷 ===== */
@media print{
  #loginView,#dashView,#formView,.report-hdr{display:none!important}
  #reportView{display:block!important}
  .report-card{box-shadow:none;padding:0}
  body{font-size:12px;background:#fff}
  .report-content h1{font-size:18px}
  .report-content h2{font-size:14px}
  @page{size:A4 portrait;margin:20mm 18mm}
}

/* ===== レスポンシブ ===== */
@media(max-width:480px){
  .summary-grid{grid-template-columns:1fr 1fr}
  .ai-grid{grid-template-columns:1fr}
  .hdr h1{font-size:14px}
  .login-card{padding:28px 18px}
}
@media(max-width:320px){
  .summary-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ===== ログインビュー ===== -->
<div id="loginView" class="view">
  <div class="login-card">
    <div class="login-logo">
      <h1>JISOO AI</h1>
      <p>経営ダッシュボード</p>
    </div>
    <div class="form-group">
      <label for="le">メールアドレス</label>
      <input type="email" id="le" placeholder="例: name@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="lp">パスワード</label>
      <input type="password" id="lp" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn-primary" onclick="login()">ログイン</button>
    <div class="login-err" id="lerr"></div>
  </div>
</div>

<!-- ===== ダッシュボードビュー ===== -->
<div id="dashView" class="view">
  <div class="hdr">
    <h1>JISOO AI 経営ダッシュボード</h1>
    <div class="hdr-controls">
      <select class="month-sel" id="dashMonth" onchange="onDashMonthChange()"></select>
      <button class="btn-sm filled" onclick="showFormView()">数字を入力</button>
      <button class="btn-sm" onclick="showReportView()">面談レポート</button>
      <button class="btn-sm outline-red" onclick="logout()">ログアウト</button>
    </div>
  </div>
  <div class="main">
    <!-- サマリーカード -->
    <div class="section-title">選択月のサマリー</div>
    <div class="summary-grid">
      <div class="summary-card">
        <div class="label">請求額</div>
        <div class="value" id="sBilling">—</div>
        <div class="sub">円（税込）</div>
      </div>
      <div class="summary-card">
        <div class="label">利益</div>
        <div class="value" id="sProfit">—</div>
        <div class="sub">入金 − 経費</div>
      </div>
      <div class="summary-card">
        <div class="label">年間契約社数</div>
        <div class="value" id="sContracts">—</div>
        <div class="sub">目標 10社</div>
        <div class="progress-bar"><div class="progress-fill" id="sContractsProg" style="width:0%"></div></div>
      </div>
      <div class="summary-card">
        <div class="label">プロダクト完成数</div>
        <div class="value" id="sProducts">—</div>
        <div class="sub">目標 30個</div>
        <div class="progress-bar"><div class="progress-fill" id="sProductsProg" style="width:0%"></div></div>
      </div>
    </div>

    <!-- AI経営参謀ゾーン -->
    <div class="section-title">AI 経営参謀</div>
    <div class="ai-grid">
      <!-- 月次コメント -->
      <div class="ai-card">
        <div class="ai-label">月次コメント</div>
        <div id="aiComment" class="ai-body"><span class="preparing">読み込み中…</span></div>
      </div>
      <!-- M&Aウォッチ -->
      <div class="ai-card">
        <div class="ai-label">M&amp;A ウォッチ</div>
        <div id="aiMaWatch" class="ai-body"><span class="preparing">読み込み中…</span></div>
      </div>
      <!-- 目標到達予測 -->
      <div class="ai-card">
        <div class="ai-label">目標到達予測（12月末）</div>
        <div id="aiForecast" class="ai-body"><span class="preparing">読み込み中…</span></div>
      </div>
    </div>

    <!-- 利益グラフ -->
    <div class="section-title">利益の推移</div>
    <div class="chart-card">
      <canvas id="profitChart"></canvas>
    </div>

    <!-- 月次一覧表 -->
    <div class="section-title">月次一覧</div>
    <div class="table-wrap">
      <table class="metrics-table" id="metricsTable">
        <thead id="metricsHead"></thead>
        <tbody id="metricsBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ===== 入力フォームビュー ===== -->
<div id="formView" class="view">
  <div class="form-hdr">
    <h2>月次数字を入力</h2>
    <button class="btn-sm" onclick="showDashView()">← ダッシュボードへ</button>
  </div>
  <div class="form-main">
    <div class="form-card">
      <div class="form-row">
        <label for="fMonth">対象月</label>
        <input type="month" id="fMonth">
      </div>
      <div class="form-section-title">売上・入金</div>
      <div class="form-row">
        <label for="fBilling">請求額（円）</label>
        <input type="number" id="fBilling" inputmode="numeric" placeholder="例: 1500000">
      </div>
      <div class="form-row">
        <label for="fPayment">入金額（円）</label>
        <input type="number" id="fPayment" inputmode="numeric" placeholder="例: 1200000">
        <div class="hint">未回収（請求 − 入金）は自動計算されます。</div>
      </div>
      <div class="form-row">
        <label for="fExpense">経費（円）</label>
        <input type="number" id="fExpense" inputmode="numeric" placeholder="例: 800000">
        <div class="hint">利益（入金 − 経費）は自動計算されます。</div>
      </div>
      <div class="form-row">
        <label for="fConfirmedRevenue">確定売上（円）</label>
        <input type="number" id="fConfirmedRevenue" inputmode="numeric" placeholder="例: 1400000">
      </div>
      <div class="form-section-title">事業指標</div>
      <div class="form-row">
        <label for="fAnnualContracts">年間契約社数</label>
        <input type="number" id="fAnnualContracts" inputmode="numeric" placeholder="例: 3">
      </div>
      <div class="form-row">
        <label for="fCompaniesTrained">研修企業数</label>
        <input type="number" id="fCompaniesTrained" inputmode="numeric" placeholder="例: 8">
      </div>
      <div class="form-row">
        <label for="fInstructors">講師数</label>
        <input type="number" id="fInstructors" inputmode="numeric" placeholder="例: 5">
      </div>
      <div class="form-row">
        <label for="fAiProducts">AIプロダクト完成数</label>
        <input type="number" id="fAiProducts" inputmode="numeric" placeholder="例: 12">
      </div>
      <div class="form-row">
        <label for="fProspects">見込み客数</label>
        <input type="number" id="fProspects" inputmode="numeric" placeholder="例: 20">
      </div>
      <div class="form-section-title">メモ</div>
      <div class="form-row">
        <label for="fMemo">特記事項（任意）</label>
        <textarea id="fMemo" placeholder="今月の特記事項や気になること"></textarea>
      </div>
      <button class="btn-primary" onclick="saveForm()">保存する</button>
      <div class="save-msg" id="saveMsg"></div>
    </div>
  </div>
</div>

<!-- ===== 面談レポートビュー ===== -->
<div id="reportView" class="view">
  <div class="report-hdr">
    <h2>面談レポート</h2>
    <button class="btn-sm" onclick="showDashView()">← ダッシュボードへ</button>
    <button class="btn-sm filled" id="genReportBtn" onclick="generateReport()">面談レポート作成</button>
    <button class="btn-sm" id="printBtn" onclick="window.print()" style="display:none">PDFとして保存</button>
  </div>
  <div class="report-main">
    <div class="report-card">
      <div id="reportContent" class="report-content">
        <p style="color:var(--text-muted);text-align:center;padding:40px 0">
          「面談レポート作成」ボタンを押すと、AIが経営サマリーを自動生成します。
        </p>
      </div>
      <div class="report-generated" id="reportGenTime"></div>
    </div>
  </div>
</div>

<script>
/* ===== 設定読み込み ===== */
var CFG = window.JISOO_CONFIG || {};
var SB_URL = (CFG.SUPABASE_URL || "").replace(/\/$/, "");
var SB_KEY = CFG.SUPABASE_ANON_KEY || "";
var FN_URL = SB_URL + "/functions/v1/ai-sanbo";
var SESS_KEY = "jisoo_sess_v1";
var TOKEN = "";

/* ===== セッション管理 ===== */
function saveSession(d){
  try{ if(d&&d.access_token) localStorage.setItem(SESS_KEY, JSON.stringify({access_token:d.access_token,refresh_token:d.refresh_token})); }catch(e){}
}
function clearSession(){ try{ localStorage.removeItem(SESS_KEY); }catch(e){} }
function loadSession(){ try{ return JSON.parse(localStorage.getItem(SESS_KEY)||"null"); }catch(e){ return null; } }

/* ===== ヘッダー生成 ===== */
function hdr(){
  return {"apikey":SB_KEY,"Authorization":"Bearer "+(TOKEN||SB_KEY)};
}

/* ===== トークン更新 ===== */
function refreshAuth(done){
  var s=loadSession();
  if(!s||!s.refresh_token){ if(done)done(false); return; }
  fetch(SB_URL+"/auth/v1/token?grant_type=refresh_token",{
    method:"POST",
    headers:{"Content-Type":"application/json","apikey":SB_KEY},
    body:JSON.stringify({refresh_token:s.refresh_token})
  }).then(function(r){ return r.json(); }).then(function(d){
    if(d&&d.access_token){ TOKEN=d.access_token; saveSession(d); if(done)done(true); }
    else { clearSession(); if(done)done(false); }
  }).catch(function(){ if(done)done(false); });
}

/* ===== 起動時自動ログイン ===== */
function tryAutoLogin(){
  refreshAuth(function(ok){
    if(ok){ enterDash(); }
    else { showLogin(); }
  });
}
window.addEventListener("load", function(){
  tryAutoLogin();
  // 45分ごとにトークンを更新
  setInterval(function(){ refreshAuth(); }, 45*60*1000);
});

/* ===== ログイン ===== */
function login(){
  var email=(document.getElementById("le").value||"").trim();
  var pw=document.getElementById("lp").value||"";
  var err=document.getElementById("lerr");
  if(!email||!pw){ err.textContent="メールとパスワードを入力してください。"; return; }
  err.textContent="ログイン中…";
  fetch(SB_URL+"/auth/v1/token?grant_type=password",{
    method:"POST",
    headers:{"Content-Type":"application/json","apikey":SB_KEY},
    body:JSON.stringify({email:email,password:pw})
  }).then(function(r){ return r.json(); }).then(function(d){
    if(d&&d.access_token){
      TOKEN=d.access_token;
      saveSession(d);
      document.getElementById("lerr").textContent="";
      enterDash();
    } else {
      err.textContent="ログインできませんでした（メール・パスワードをご確認ください）。";
    }
  }).catch(function(e){ err.textContent="通信エラー："+(e&&e.message||e); });
}

/* ===== ログアウト ===== */
function logout(){
  TOKEN=""; clearSession(); showLogin();
}

/* ===== ビュー切替 ===== */
function showView(id){
  ["loginView","dashView","formView","reportView"].forEach(function(v){
    document.getElementById(v).classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}
function showLogin(){ showView("loginView"); }
function showDashView(){ showView("dashView"); }
function showFormView(){ initFormView(); showView("formView"); }
function showReportView(){ showView("reportView"); }

/* ===== ダッシュボード入場 ===== */
var ALL_METRICS = [];
var ALL_COMMENTS = {};
var SELECTED_MONTH = "";

function enterDash(){
  showView("dashView");
  loadDashData();
}

function loadDashData(){
  // monthly_metrics と ai_comments を並行取得
  Promise.all([
    sbGet("monthly_metrics?select=*&order=year_month"),
    sbGet("ai_comments?select=*&order=year_month")
  ]).then(function(results){
    ALL_METRICS = results[0] || [];
    var comments = results[1] || [];
    // ai_comments をyear_monthをキーにしたマップへ
    ALL_COMMENTS = {};
    comments.forEach(function(c){ ALL_COMMENTS[c.year_month] = c; });
    buildMonthSelector();
    renderDash();
  }).catch(function(e){
    console.error("データ取得エラー:", e);
  });
}

/* ===== 月セレクター構築 ===== */
function buildMonthSelector(){
  var sel = document.getElementById("dashMonth");
  sel.innerHTML = "";
  if(ALL_METRICS.length === 0){
    var opt = document.createElement("option");
    opt.value = "";
    opt.textContent = "データなし";
    sel.appendChild(opt);
    return;
  }
  // 降順（新しい月が上）
  var months = ALL_METRICS.map(function(m){ return m.year_month; }).sort().reverse();
  months.forEach(function(ym){
    var opt = document.createElement("option");
    opt.value = ym;
    opt.textContent = ym.replace("-","年")+"月";
    sel.appendChild(opt);
  });
  // 初回: SELECTED_MONTH が未設定なら最新月
  if(!SELECTED_MONTH || !months.includes(SELECTED_MONTH)){
    SELECTED_MONTH = months[0];
  }
  sel.value = SELECTED_MONTH;
}

function onDashMonthChange(){
  SELECTED_MONTH = document.getElementById("dashMonth").value;
  renderDash();
}

/* ===== ダッシュボード描画 ===== */
function renderDash(){
  renderSummary();
  renderAiCards();
  renderChart();
  renderTable();
}

function getMetric(ym){
  for(var i=0;i<ALL_METRICS.length;i++){
    if(ALL_METRICS[i].year_month===ym) return ALL_METRICS[i];
  }
  return null;
}

function fmt(n){ return n==null?"—":(Number(n)||0).toLocaleString("ja-JP"); }
function pct(v,max){ return max>0?Math.min(100,Math.round(v/max*100)):0; }

/* ===== サマリーカード描画 ===== */
function renderSummary(){
  var m = getMetric(SELECTED_MONTH) || {};
  var billing = m.billing!=null?Number(m.billing):null;
  var payment = m.payment!=null?Number(m.payment):null;
  var expense = m.expense!=null?Number(m.expense):null;
  var profit = (payment!=null&&expense!=null)?payment-expense:null;
  var contracts = m.annual_contracts!=null?Number(m.annual_contracts):null;
  var products = m.ai_products!=null?Number(m.ai_products):null;

  document.getElementById("sBilling").textContent = billing!=null?fmt(billing)+"円":"—";
  document.getElementById("sProfit").textContent = profit!=null?fmt(profit)+"円":"—";
  document.getElementById("sContracts").textContent = contracts!=null?contracts+"社":"—";
  document.getElementById("sProducts").textContent = products!=null?products+"個":"—";
  document.getElementById("sContractsProg").style.width = contracts!=null?pct(contracts,10)+"%":"0%";
  document.getElementById("sProductsProg").style.width = products!=null?pct(products,30)+"%":"0%";
}

/* ===== AIカード描画 ===== */
function renderAiCards(){
  var c = ALL_COMMENTS[SELECTED_MONTH] || null;

  // 月次コメント
  var commentEl = document.getElementById("aiComment");
  if(c&&c.monthly_comment){
    commentEl.innerHTML = esc(c.monthly_comment);
  } else {
    commentEl.innerHTML = '<span class="preparing">AIコメントは準備中です。</span><br>'
      +'<button class="regen-btn" onclick="regenComments()">再生成</button>';
  }

  // M&Aウォッチ
  var maEl = document.getElementById("aiMaWatch");
  if(c&&c.ma_watch){
    maEl.innerHTML = esc(c.ma_watch);
  } else {
    maEl.innerHTML = '<span class="preparing">準備中です。</span>';
  }

  // 目標到達予測（線形回帰はAIなしで計算）
  renderForecast(c);
}

/* ===== 目標到達予測（線形回帰） ===== */
function renderForecast(aiComment){
  var el = document.getElementById("aiForecast");
  // データが2点以上ないと計算できない
  var sorted = ALL_METRICS.slice().sort(function(a,b){ return a.year_month>b.year_month?1:-1; });
  if(sorted.length < 2){
    el.innerHTML = '<span class="preparing">データが2ヶ月分以上あると予測できます。</span>';
    if(aiComment&&aiComment.forecast_note){
      el.innerHTML += '<div class="ai-note">'+esc(aiComment.forecast_note)+'</div>';
    }
    return;
  }

  // 月を数値化（基準月からの差分）
  var base = sorted[0].year_month;
  function monthIdx(ym){
    var by=parseInt(base.split("-")[0]),bm=parseInt(base.split("-")[1]);
    var y=parseInt(ym.split("-")[0]),m=parseInt(ym.split("-")[1]);
    return (y-by)*12+(m-bm);
  }
  // 12月末のインデックス
  var dec = monthIdx(base.split("-")[0]+"-12"); // 同年12月
  // もし基準月が12月以降なら翌年
  var baseYear = parseInt(base.split("-")[0]);
  var curYear = new Date().getFullYear();
  var targetYear = curYear;
  var targetDec = monthIdx(targetYear+"-12");

  function linearForecast(values){
    // values = [{x,y}]
    if(values.length<2) return null;
    var n=values.length;
    var sx=0,sy=0,sxy=0,sx2=0;
    values.forEach(function(p){ sx+=p.x; sy+=p.y; sxy+=p.x*p.y; sx2+=p.x*p.x; });
    var denom=n*sx2-sx*sx;
    if(denom===0) return null;
    var a=(n*sxy-sx*sy)/denom;
    var b=(sy-a*sx)/n;
    return function(x){ return Math.round(a*x+b); };
  }

  var contractPts=[], productPts=[];
  sorted.forEach(function(m){
    var x=monthIdx(m.year_month);
    if(m.annual_contracts!=null) contractPts.push({x:x,y:Number(m.annual_contracts)});
    if(m.ai_products!=null) productPts.push({x:x,y:Number(m.ai_products)});
  });

  var fContract=linearForecast(contractPts);
  var fProduct=linearForecast(productPts);
  var predContracts=fContract?fContract(targetDec):null;
  var predProducts=fProduct?fProduct(targetDec):null;

  var html="";
  if(predContracts!=null){
    html+='<div class="badge">年間契約: '+targetYear+'年12月末 推定 '+Math.max(0,predContracts)+'社</div><br>';
  }
  if(predProducts!=null){
    html+='<div class="badge">AIプロダクト: '+targetYear+'年12月末 推定 '+Math.max(0,predProducts)+'個</div>';
  }
  if(!html) html='<span class="preparing">計算できるデータがありません。</span>';
  if(aiComment&&aiComment.forecast_note){
    html+='<div class="ai-note">'+esc(aiComment.forecast_note)+'</div>';
  }
  el.innerHTML=html;
}

/* ===== AIコメント再生成 ===== */
function regenComments(){
  var commentEl=document.getElementById("aiComment");
  commentEl.innerHTML='<span class="spinner"></span>生成中…';
  callAiSanbo(SELECTED_MONTH,"comments").then(function(res){
    if(res&&res.ok&&res.comments){
      ALL_COMMENTS[SELECTED_MONTH]=res.comments;
      renderAiCards();
    } else {
      commentEl.innerHTML='<span class="preparing">生成に失敗しました。しばらく後で再試行してください。</span>'
        +'<br><button class="regen-btn" onclick="regenComments()">再生成</button>';
    }
  }).catch(function(){
    commentEl.innerHTML='<span class="preparing">通信エラーが発生しました。</span>'
      +'<br><button class="regen-btn" onclick="regenComments()">再生成</button>';
  });
}

/* ===== グラフ描画 ===== */
var profitChartInst = null;
function renderChart(){
  var sorted = ALL_METRICS.slice().sort(function(a,b){ return a.year_month>b.year_month?1:-1; });
  var labels=[], data=[];
  sorted.forEach(function(m){
    if(m.payment!=null&&m.expense!=null){
      labels.push(m.year_month.replace("-","年")+"月");
      data.push(Number(m.payment)-Number(m.expense));
    }
  });
  var ctx=document.getElementById("profitChart").getContext("2d");
  if(profitChartInst){ profitChartInst.destroy(); }
  profitChartInst=new Chart(ctx,{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"利益（円）",
        data:data,
        borderColor:"#0F6E56",
        backgroundColor:"rgba(15,110,86,.10)",
        borderWidth:2,
        pointBackgroundColor:"#0F6E56",
        pointRadius:5,
        tension:.3,
        fill:true
      }]
    },
    options:{
      responsive:true,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:function(ctx){ return "  "+ctx.parsed.y.toLocaleString("ja-JP")+"円"; }}}
      },
      scales:{
        y:{
          ticks:{callback:function(v){ return v.toLocaleString("ja-JP"); }},
          grid:{color:"rgba(0,0,0,.05)"}
        },
        x:{grid:{display:false}}
      }
    }
  });
}

/* ===== 月次一覧表 ===== */
var ROWS=[
  {key:"billing",label:"請求額（円）"},
  {key:"payment",label:"入金額（円）"},
  {key:"_uncollected",label:"未回収（円）",calc:true},
  {key:"expense",label:"経費（円）"},
  {key:"_profit",label:"利益（円）",calc:true},
  {key:"annual_contracts",label:"年間契約社数"},
  {key:"companies_trained",label:"研修企業数"},
  {key:"instructors",label:"講師数"},
  {key:"ai_products",label:"AIプロダクト数"},
  {key:"prospects",label:"見込み客数"},
  {key:"confirmed_revenue",label:"確定売上（円）"},
];
function renderTable(){
  var sorted=ALL_METRICS.slice().sort(function(a,b){ return a.year_month>b.year_month?1:-1; });
  if(sorted.length===0){
    document.getElementById("metricsHead").innerHTML='<tr><th>項目</th></tr>';
    document.getElementById("metricsBody").innerHTML='<tr><td colspan="2" style="text-align:center;color:var(--text-muted)">データがありません</td></tr>';
    return;
  }
  // ヘッダー（項目 + 月名）
  var hRow='<tr><th>項目</th>';
  sorted.forEach(function(m){ hRow+='<th>'+m.year_month.replace("-","年")+"月"+'</th>'; });
  hRow+='</tr>';
  document.getElementById("metricsHead").innerHTML=hRow;

  // 行
  var body="";
  ROWS.forEach(function(row){
    var isCalc=row.calc;
    body+='<tr><td>'+esc(row.label)+'</td>';
    sorted.forEach(function(m){
      var val;
      if(row.key==="_uncollected"){
        val=(m.billing!=null&&m.payment!=null)?Number(m.billing)-Number(m.payment):null;
      } else if(row.key==="_profit"){
        val=(m.payment!=null&&m.expense!=null)?Number(m.payment)-Number(m.expense):null;
      } else {
        val=m[row.key]!=null?Number(m[row.key]):null;
      }
      body+='<td class="'+(isCalc?"calc-col":"")+'">'+fmt(val)+'</td>';
    });
    body+='</tr>';
  });
  document.getElementById("metricsBody").innerHTML=body;
}

/* ===== GET ヘルパー ===== */
function sbGet(path){
  return fetch(SB_URL+"/rest/v1/"+path,{headers:hdr()})
    .then(function(res){ return res.json().then(function(j){ if(!res.ok) throw new Error((j&&j.message)||("HTTP "+res.status)); return j; }); });
}

/* ===== Upsert ヘルパー ===== */
function sbUpsert(table,rows){
  return fetch(SB_URL+"/rest/v1/"+table,{
    method:"POST",
    headers:Object.assign({"Content-Type":"application/json","Prefer":"resolution=merge-duplicates,return=representation"},hdr()),
    body:JSON.stringify(rows)
  }).then(function(res){ return res.text().then(function(t){ var j=null; try{j=t?JSON.parse(t):null;}catch(e){} if(!res.ok) throw new Error((j&&j.message)||("HTTP "+res.status)); return j; }); });
}

/* ===== Edge Function 呼び出し ===== */
function callAiSanbo(ym, mode){
  var body={year_month:ym,mode:mode};
  return fetch(FN_URL,{
    method:"POST",
    headers:Object.assign({"Content-Type":"application/json"},hdr()),
    body:JSON.stringify(body)
  }).then(function(res){ return res.json(); });
}

/* ===== 入力フォーム ===== */
function initFormView(){
  // デフォルト=先月
  var now=new Date();
  var y=now.getFullYear(), m=now.getMonth(); // getMonth()は0始まり→先月
  if(m===0){ y--; m=12; }
  var ym=y+"-"+("0"+m).slice(-2);
  var fMonth=document.getElementById("fMonth");
  if(!fMonth.value) fMonth.value=ym;
  // 既存データがあれば読み込む
  loadFormData(fMonth.value);
  fMonth.onchange=function(){ loadFormData(fMonth.value); };
}

function loadFormData(ym){
  if(!ym) return;
  var existing=getMetric(ym);
  var fields={billing:"fBilling",payment:"fPayment",expense:"fExpense",
               confirmed_revenue:"fConfirmedRevenue",annual_contracts:"fAnnualContracts",
               companies_trained:"fCompaniesTrained",instructors:"fInstructors",
               ai_products:"fAiProducts",prospects:"fProspects",memo:"fMemo"};
  for(var k in fields){
    var el=document.getElementById(fields[k]);
    if(el) el.value=(existing&&existing[k]!=null)?existing[k]:"";
  }
  document.getElementById("saveMsg").textContent="";
}

function numOrNull(id){
  var v=(document.getElementById(id).value||"").trim();
  if(v===""||v==="null") return null;
  var n=Number(v);
  return isNaN(n)?null:n;
}

function saveForm(){
  var ym=(document.getElementById("fMonth").value||"").trim();
  if(!ym){ document.getElementById("saveMsg").innerHTML='<span class="save-err">月を選択してください。</span>'; return; }
  var row={
    year_month:ym,
    billing:numOrNull("fBilling"),
    payment:numOrNull("fPayment"),
    expense:numOrNull("fExpense"),
    confirmed_revenue:numOrNull("fConfirmedRevenue"),
    annual_contracts:numOrNull("fAnnualContracts"),
    companies_trained:numOrNull("fCompaniesTrained"),
    instructors:numOrNull("fInstructors"),
    ai_products:numOrNull("fAiProducts"),
    prospects:numOrNull("fProspects"),
    memo:(document.getElementById("fMemo").value||"").trim()||null
  };
  var msg=document.getElementById("saveMsg");
  msg.innerHTML='<span class="spinner"></span>保存中…';
  sbUpsert("monthly_metrics",[row]).then(function(){
    msg.textContent="保存しました。AI参謀が分析中…";
    // ALL_METRICSを更新
    var found=false;
    for(var i=0;i<ALL_METRICS.length;i++){
      if(ALL_METRICS[i].year_month===ym){ ALL_METRICS[i]=Object.assign(ALL_METRICS[i],row); found=true; break; }
    }
    if(!found) ALL_METRICS.push(row);
    // AIコメント生成（失敗してもエラーで止めない）
    callAiSanbo(ym,"comments").then(function(res){
      if(res&&res.ok&&res.comments){ ALL_COMMENTS[ym]=res.comments; }
      msg.textContent="保存しました。ダッシュボードへ戻ります…";
      setTimeout(function(){ SELECTED_MONTH=ym; showView("dashView"); renderDash(); },1200);
    }).catch(function(){
      msg.textContent="保存しました。AIコメントは後で生成できます。";
      setTimeout(function(){ SELECTED_MONTH=ym; showView("dashView"); renderDash(); },1500);
    });
  }).catch(function(e){
    msg.innerHTML='<span class="save-err">保存に失敗しました: '+esc(e&&e.message||String(e))+'</span>';
  });
}

/* ===== 面談レポート生成 ===== */
function generateReport(){
  var btn=document.getElementById("genReportBtn");
  var printBtn=document.getElementById("printBtn");
  var content=document.getElementById("reportContent");
  var genTime=document.getElementById("reportGenTime");
  btn.disabled=true;
  content.innerHTML='<div class="report-generating"><span class="spinner"></span>AIが面談レポートを生成しています…</div>';
  printBtn.style.display="none";
  genTime.textContent="";
  callAiSanbo(SELECTED_MONTH,"report").then(function(res){
    btn.disabled=false;
    if(res&&res.ok&&res.report_md){
      content.innerHTML=renderMd(res.report_md);
      var now=new Date();
      genTime.textContent="生成日時: "+now.getFullYear()+"年"+(now.getMonth()+1)+"月"+now.getDate()+"日 "+("0"+now.getHours()).slice(-2)+":"+("0"+now.getMinutes()).slice(-2);
      printBtn.style.display="inline-block";
    } else {
      var err=(res&&res.error)||"不明なエラー";
      content.innerHTML='<p style="color:#c0392b">レポートの生成に失敗しました: '+esc(err)+'</p>';
    }
  }).catch(function(e){
    btn.disabled=false;
    content.innerHTML='<p style="color:#c0392b">通信エラーが発生しました: '+esc(e&&e.message||String(e))+'</p>';
  });
}

/* ===== マークダウン 簡易レンダラ（#/##見出し・**太字**・箇条書き・表） ===== */
function renderMd(md){
  var lines=md.split("\n");
  var html="", inTable=false, inList=false;
  function closeTable(){ if(inTable){ html+='</tbody></table>'; inTable=false; } }
  function closeList(){ if(inList){ html+='</ul>'; inList=false; } }
  var tableHead=true;
  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    // 表
    if(/^\|/.test(line)){
      if(!inTable){ closeList(); html+='<table><thead><tr>'; inTable=true; tableHead=true; }
      if(/^[\|\s\-:]+$/.test(line)){ html+='</tr></thead><tbody>'; tableHead=false; continue; }
      var cells=line.split("|").filter(function(c,idx,arr){ return idx>0&&idx<arr.length-1; });
      var tag=tableHead?"th":"td";
      html+='<tr>'+cells.map(function(c){ return '<'+tag+'>'+inlineMd(c.trim())+'</'+tag+'>'; }).join('')+'</tr>';
      continue;
    }
    closeTable(); tableHead=true;
    // 見出し
    if(/^###\s/.test(line)){ closeList(); html+='<h3>'+inlineMd(line.slice(4))+'</h3>'; continue; }
    if(/^##\s/.test(line)){ closeList(); html+='<h2>'+inlineMd(line.slice(3))+'</h2>'; continue; }
    if(/^#\s/.test(line)){ closeList(); html+='<h1>'+inlineMd(line.slice(2))+'</h1>'; continue; }
    // リスト
    if(/^[-*]\s/.test(line)){
      if(!inList){ html+='<ul>'; inList=true; }
      html+='<li>'+inlineMd(line.slice(2))+'</li>';
      continue;
    }
    if(/^\d+\.\s/.test(line)){
      if(!inList){ html+='<ol>'; inList=true; }
      html+='<li>'+inlineMd(line.replace(/^\d+\.\s/,""))+'</li>';
      continue;
    }
    closeList();
    // 空行
    if(line.trim()===""){ html+='<p></p>'; continue; }
    html+='<p>'+inlineMd(line)+'</p>';
  }
  closeTable(); closeList();
  return html;
}
function inlineMd(s){
  return esc(s).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/`(.+?)`/g,"<code>$1</code>");
}

/* ===== エスケープ ===== */
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
